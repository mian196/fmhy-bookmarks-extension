<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FMHY Auto-Sync</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="apple-container">
    <!-- Navigation / Header -->
    <header class="header">
      <div class="brand">
        <img src="../assets/logo.svg" width="28" height="28" alt="FMHY Logo" class="brand-icon">
        <div class="title-meta">
          <h1 class="title">FMHY Auto-Sync</h1>
          <span class="version-tag">v1.3.0</span>
        </div>
      </div>

      <div class="actions-cluster">
        <button id="btn-theme-toggle" class="circular-btn" title="Toggle Theme" aria-label="Toggle Theme">
          <svg id="theme-icon-sun" class="theme-icon hidden" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg id="theme-icon-moon" class="theme-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>

        <button id="btn-options" class="circular-btn" title="Settings" aria-label="Settings">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Product Tile Card -->
    <main class="apple-card">
      <div class="card-status-bar">
        <span class="status-chip" id="status-badge">
          <span class="status-dot"></span>
          <span id="status-text">Checking status...</span>
        </span>
        <span class="preset-chip" id="preset-pill">Full Directory</span>
      </div>

      <div class="metrics-row">
        <div class="metric-tile">
          <span class="metric-number" id="count-value">--</span>
          <span class="metric-caption">Bookmarks Synced</span>
        </div>
        <div class="metric-divider"></div>
        <div class="metric-tile">
          <span class="metric-number" id="time-value">Never</span>
          <span class="metric-caption">Last Sync</span>
        </div>
      </div>

      <div class="info-banner" id="message-banner">
        Ready to sync with GitHub repository.
      </div>

      <!-- Action Blue Primary Button -->
      <button id="btn-sync" class="btn-primary-pill">
        <svg id="sync-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.5 2v6h-6"/>
          <path d="M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/>
        </svg>
        <span id="btn-sync-text">Sync Now</span>
      </button>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <a href="https://fmhy.net" target="_blank" rel="noopener" class="footer-link">FMHY.net</a>
      <span class="footer-separator">•</span>
      <a href="#" id="btn-clear-cache" class="footer-link">Force Refresh</a>
    </footer>
  </div>

  <script src="../lib/webextension-polyfill.js"></script>
  <script src="popup.js"></script>
</body>
</html>
