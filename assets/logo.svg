<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" fill="none">
  <defs>
    <!-- Background Obsidian Gradient -->
    <linearGradient id="bgGradient" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="50%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#070a12"/>
    </linearGradient>

    <!-- Outer Squircle Border Glow -->
    <linearGradient id="borderGlow" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0066cc" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00f2fe" stop-opacity="0.6"/>
    </linearGradient>

    <!-- Isometric 3D Bookmark Ribbon Primary Gradient -->
    <linearGradient id="ribbonMain" x1="38" y1="24" x2="88" y2="98" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0066cc"/>
      <stop offset="50%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>

    <!-- Bookmark Ribbon Fold Shadow Accent -->
    <linearGradient id="ribbonFold" x1="44" y1="24" x2="44" y2="98" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.3"/>
    </linearGradient>

    <!-- Orbital Sync Ring Gradient -->
    <linearGradient id="syncRingGrad" x1="20" y1="20" x2="108" y2="108" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00f2fe"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>

    <!-- Center Gold Star Emblem Gradient -->
    <linearGradient id="goldStarGrad" x1="52" y1="44" x2="76" y2="68" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fffbeb"/>
      <stop offset="30%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>

    <!-- Container Shadow Filter -->
    <filter id="badgeShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.35"/>
    </filter>

    <!-- Clean Crisp Ribbon Drop Shadow -->
    <filter id="ribbonShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.35"/>
    </filter>

    <!-- Radiant Gold Star Shadow Filter -->
    <filter id="starGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="3" flood-color="#f59e0b" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- Base Squircle Container -->
  <rect x="6" y="6" width="116" height="116" rx="30" fill="url(#bgGradient)" stroke="url(#borderGlow)" stroke-width="1.5" filter="url(#badgeShadow)"/>

  <!-- Orbital Sync Ring (Uniform Seamless Dashed Loop) -->
  <circle cx="64" cy="64" r="46" stroke="url(#syncRingGrad)" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="16 8.0855" stroke-dashoffset="0" opacity="0.85"/>

  <!-- Centered Icon Group (Scaled to 82% for Perfect Breathing Room) -->
  <g transform="translate(64, 64) scale(0.82) translate(-64, -64)">
    <!-- 3D Dual-Tone Bookmark Ribbon Shadow & Shape -->
    <g filter="url(#ribbonShadow)">
      <path d="M 44 26 L 84 26 C 86.2 26 88 27.8 88 30 L 88 98 C 88 100.8 84.6 102.4 82.4 100.5 L 64 85 L 45.6 100.5 C 43.4 102.4 40 100.8 40 98 L 40 30 C 40 27.8 41.8 26 44 26 Z" fill="url(#ribbonMain)"/>
      <path d="M 44 26 L 64 26 L 64 85 L 45.6 100.5 C 43.4 102.4 40 100.8 40 98 L 40 30 C 40 27.8 41.8 26 44 26 Z" fill="url(#ribbonFold)"/>
    </g>

    <!-- Center Crisp Gold Star Emblem -->
    <g filter="url(#starGlow)">
      <polygon points="64,42 67.8,51.2 77.5,52 70.2,58.2 72.4,67.8 64,62.8 55.6,67.8 57.8,58.2 50.5,52 60.2,51.2" fill="url(#goldStarGrad)"/>
    </g>
  </g>
</svg>
