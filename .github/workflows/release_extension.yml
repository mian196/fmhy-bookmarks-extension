name: Package & Release Extension

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Extract Tag Version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Build Extension Packages for Chromium and Firefox
        run: python tools/build.py "${{ env.VERSION }}"

      - name: Generate Gemini AI Release Notes
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python .github/scripts/gemini_release_notes.py

      - name: Create GitHub Release & Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ hashFiles('gemini_release_notes.md') != '' && 'gemini_release_notes.md' || '' }}
          generate_release_notes: ${{ hashFiles('gemini_release_notes.md') == '' }}
          files: |
            dist/fmhy-bookmarks-extension-${{ env.VERSION }}.chromium.zip
            dist/fmhy-bookmarks-extension-${{ env.VERSION }}.firefox.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
