name: Gemini AI PR Summarizer

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  gemini-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fetch PR Diff
        id: diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > pr_diff.txt
          echo "PR_DIFF_FILE=pr_diff.txt" >> $GITHUB_ENV

      - name: Run Gemini AI Summary Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          export PR_DIFF=$(cat pr_diff.txt)
          python .github/scripts/gemini_ai.py

      - name: Comment Gemini Summary on PR
        if: hashFiles('gemini_summary.md') != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            if (fs.existsSync('gemini_summary.md')) {
              const body = fs.readFileSync('gemini_summary.md', 'utf8');
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }
